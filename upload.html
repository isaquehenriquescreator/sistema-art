<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload — Arte Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .storage-usage {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      opacity: 0.55;
      transition: opacity 0.3s ease;
    }
    .storage-usage:hover { opacity: 1; }
    .storage-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .storage-bar-wrap {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .storage-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      border-radius: 2px;
      transition: width 1s ease;
    }
    .storage-text {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <a href="index.html" class="logo">
    <div class="logo-mark"><span></span></div>
    <span class="logo-text">Arte Gallery</span>
  </a>
  <nav>
    <a href="upload.html" class="nav-link active">Upload</a>
    <a href="view.html"   class="nav-link">Visualizar</a>
  </nav>
</header>

<!-- ══ PAGE ══ -->
<main class="page">

  <div class="section-heading">
    <span class="eyebrow">Nova Obra</span>
    <h1>Enviar Arte</h1>
    <p>Faça o upload de uma imagem para exibi-la na galeria em tempo real.</p>
    <div class="gold-line"></div>
  </div>

  <div class="upload-container">
    <div class="upload-card">

      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="drop-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
        </div>
        <p class="drop-label">
          <strong>Clique para selecionar</strong> ou arraste uma imagem aqui<br>
          <small style="color:#4a4440;font-size:0.72rem;margin-top:6px;display:block">PNG, JPG, GIF, WEBP — máx. 50 MB</small>
        </p>
      </div>

      <!-- Preview -->
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="Pré-visualização" />
        <button class="preview-clear" id="previewClear" title="Remover">✕</button>
      </div>

      <!-- Nome da arte -->
      <div class="field">
        <label for="arteName">Nome da obra <span style="color:#4a4440">(opcional)</span></label>
        <input type="text" id="arteName" placeholder="Ex: Noite Estrelada, Série Azul #3…" maxlength="120" />
      </div>

      <!-- Submit -->
      <button class="btn btn-primary" id="submitBtn" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <span id="btnLabel">Enviar para a Galeria</span>
      </button>

      <!-- Progress -->
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Feedback -->
      <div class="feedback" id="feedback"></div>

      <!-- Storage usage -->
      <div class="storage-usage" id="storageUsage">
        <span class="storage-label">Armazenamento</span>
        <div class="storage-bar-wrap">
          <div class="storage-bar-fill" id="storageFill"></div>
        </div>
        <span class="storage-text" id="storageText">—</span>
      </div>

    </div>
  </div>

</main>

<footer>
  &copy; <span id="year"></span> Arte Gallery — Sistema de Apresentação de Artes
</footer>

<!-- ══ SUPABASE SDK ══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  /* ================================================================
     CONFIGURAÇÃO — Substitua pelos seus valores reais do Supabase:
     1. Acesse https://supabase.com → Seu projeto → Settings → API
     2. Copie a "Project URL" e a "anon public" key
     ================================================================ */
  const SUPABASE_URL = 'https://goipzbwunaseztcgjzww.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvaXB6Ynd1bmFzZXp0Y2dqend3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTAyNTAsImV4cCI6MjA4ODI4NjI1MH0.ZCj4BwkpMpPKWvskAa3MoYgVhe0HeKRUphxnLbAM-h0';

  /* ----------------------------------------------------------------
     SEGURANÇA — Row Level Security (RLS) no Supabase:
     Para ativar no painel do Supabase, vá em:
       Table Editor → artes → RLS → Enable RLS
     Depois crie as policies:
       • SELECT: role = anon  (leitura pública)
       • INSERT: role = anon  (ou autenticado, se quiser restringir)
     Para restringir inserts apenas a usuários autenticados:
       • Remova a policy de INSERT para anon
       • Adicione: USING (auth.role() = 'authenticated')
     E descomente o bloco de login abaixo.
     ---------------------------------------------------------------- */

  /* LOGIN OPCIONAL — descomente se RLS exigir autenticação:
  const { error: authError } = await db.auth.signInWithPassword({
    email: 'admin@example.com',
    password: 'senha-segura',
  });
  if (authError) console.error('Auth error:', authError.message);
  */

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── DOM refs ── */
  const fileInput    = document.getElementById('fileInput');
  const dropZone     = document.getElementById('dropZone');
  const previewWrap  = document.getElementById('previewWrap');
  const previewImg   = document.getElementById('previewImg');
  const previewClear = document.getElementById('previewClear');
  const arteName     = document.getElementById('arteName');
  const submitBtn    = document.getElementById('submitBtn');
  const btnLabel     = document.getElementById('btnLabel');
  const progressBar  = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const feedback     = document.getElementById('feedback');

  document.getElementById('year').textContent = new Date().getFullYear();

  let selectedFile = null;

  /* ── File selection ── */
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  function handleFile(file) {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      showFeedback('error', 'Por favor selecione apenas arquivos de imagem (PNG, JPG, GIF, WEBP).');
      return;
    }
    if (file.size > 50 * 1024 * 1024) {
      showFeedback('error', 'O arquivo excede o limite de 50 MB.');
      return;
    }
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewWrap.classList.add('show');
    submitBtn.disabled = false;
    clearFeedback();
  }

  previewClear.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    previewImg.src = '';
    previewWrap.classList.remove('show');
    submitBtn.disabled = true;
    clearFeedback();
  });

  /* ── Drag & Drop ── */
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  /* ── Submit ── */
  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    setLoading(true);
    clearFeedback();
    showProgress(10);

    try {
      /* 1. Gera nome único para o arquivo no Storage */
      const ext      = selectedFile.name.split('.').pop();
      const filePath = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

      showProgress(30);

      /* 2. Upload para o Supabase Storage (bucket: 'artes') */
      const { data: storageData, error: storageError } = await db
        .storage
        .from('artes')
        .upload(filePath, selectedFile, {
          cacheControl: '3600',
          upsert: false,
          contentType: selectedFile.type,
        });

      if (storageError) throw storageError;

      showProgress(65);

      /* 3. Obtém a URL pública da imagem */
      const { data: { publicUrl } } = db
        .storage
        .from('artes')
        .getPublicUrl(filePath);

      showProgress(80);

      /* 4. Insere metadados na tabela 'artes' */
      const nome = arteName.value.trim() || 'Sem título';
      const { error: dbError } = await db
        .from('artes')
        .insert({
          nome:       nome,
          url:        publicUrl,
          created_at: new Date().toISOString(),
        });

      if (dbError) throw dbError;

      showProgress(100);

      /* 5. Sucesso! */
      showFeedback('success',
        `✓ Arte <strong>"${nome}"</strong> enviada com sucesso! Ela já está disponível na galeria.`
      );

      /* Limpa o formulário */
      setTimeout(() => {
        previewClear.click();
        arteName.value = '';
        progressBar.classList.remove('show');
        progressFill.style.width = '0%';
      }, 800);

    } catch (err) {
      console.error('Erro no upload:', err);
      showFeedback('error',
        `Erro ao enviar: ${err.message || 'Verifique sua conexão e as configurações do Supabase.'}`
      );
      progressBar.classList.remove('show');
    } finally {
      setLoading(false);
    }
  });

  /* ── Helpers ── */
  function setLoading(loading) {
    submitBtn.disabled = loading;
    btnLabel.textContent = loading ? 'Enviando…' : 'Enviar para a Galeria';
  }

  function showProgress(pct) {
    progressBar.classList.add('show');
    progressFill.style.width = pct + '%';
  }

  function showFeedback(type, html) {
    feedback.className = `feedback ${type} show`;
    feedback.innerHTML = html;
  }

  function clearFeedback() {
    feedback.className = 'feedback';
    feedback.innerHTML = '';
  }

  /* ── Storage usage ── */
  async function loadStorageUsage() {
    try {
      const { data, error } = await db.storage.from('artes').list('', { limit: 1000 });
      if (error || !data) return;
      const totalBytes = data.reduce((acc, f) => acc + (f.metadata?.size || 0), 0);
      const limitBytes = 50 * 1024 * 1024; // 50 MB (plano free)
      const pct = Math.min((totalBytes / limitBytes) * 100, 100);
      const usedMB = (totalBytes / (1024 * 1024)).toFixed(1);
      document.getElementById('storageFill').style.width = pct + '%';
      document.getElementById('storageText').textContent = `${usedMB} MB / 50 MB`;
    } catch (_) { /* silently ignore */ }
  }

  loadStorageUsage();
</script>

</body>
</html>
